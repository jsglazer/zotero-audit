<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zotero Audit</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    #wrapper {
      width: 100%;
      height: calc(100% - 24px);
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    thead tr {
      background: #111;
    }

    th {
      padding: 5px 8px;
      text-align: left;
      font-weight: 600;
      color: #999;
      border-bottom: 2px solid #333;
      border-right: 1px solid #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
      cursor: pointer;
    }

    th:hover {
      color: #ccc;
      background: #1a1a1a;
    }

    th.sorted {
      color: #fff;
    }

    .sort-arrow {
      margin-left: 3px;
      font-size: 10px;
    }

    /* Column widths */
    th:nth-child(1), td:nth-child(1) { width: 12%; }
    th:nth-child(2), td:nth-child(2) { width: 18%; }
    th:nth-child(3), td:nth-child(3) { width: 22%; }
    th:nth-child(4), td:nth-child(4) { width: 12%; }
    th:nth-child(5), td:nth-child(5) { width: 16%; }
    th:nth-child(6), td:nth-child(6) { width: 10%; }
    th:nth-child(7), td:nth-child(7) { width: 10%; }

    tbody tr:nth-child(even) td {
      filter: brightness(0.95);
    }

    td {
      padding: 0;
      border: 1px solid #1c1c1c;
      height: 26px;
    }

    td.present {
      background: #90ee90;
    }

    td.missing {
      background: #ffb3b3;
    }

    input.cell {
      display: block;
      width: 100%;
      height: 100%;
      padding: 4px 7px;
      border: none;
      outline: none;
      font-size: 13px;
      font-family: inherit;
      background: transparent;
      color: #000;
      cursor: text;
    }

    input.cell:focus {
      box-shadow: inset 0 0 0 2px rgba(60, 130, 255, 0.75);
      background: rgba(255, 255, 255, 0.15);
    }

    #statusbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      line-height: 24px;
      background: #0d0d0d;
      color: #777;
      padding: 0 10px;
      font-size: 11px;
      border-top: 1px solid #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #statusbar.error  { color: #ff8080; }
    #statusbar.saving { color: #aaa; }
  </style>
</head>
<body>
  <div id="wrapper">
    <table>
      <thead>
        <tr>
          <th data-sort="type">Content Type<span class="sort-arrow"></span></th>
          <th data-sort="citationKey">Citation ID<span class="sort-arrow"></span></th>
          <th data-sort="title">Title<span class="sort-arrow"></span></th>
          <th data-sort="shortTitle">Short Title<span class="sort-arrow"></span></th>
          <th data-sort="author">Author<span class="sort-arrow"></span></th>
          <th data-sort="year">Year<span class="sort-arrow"></span></th>
          <th data-sort="month">Month<span class="sort-arrow"></span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div id="statusbar">Loading…</div>

  <script>
    "use strict";

    (async () => {
      const tbody = document.getElementById("tbody");
      const statusbar = document.getElementById("statusbar");

      function setStatus(msg, cls) {
        statusbar.textContent = msg;
        statusbar.className = cls || "";
      }

      // Zotero is passed from bootstrap.js via openDialog's extra argument.
      // window.arguments[0] is a live object reference (chrome-to-chrome is safe).
      const Zotero = window.arguments[0];
      if (!Zotero) {
        setStatus("Error: Zotero not passed to dialog", "error");
        return;
      }
      try {
        await Zotero.initializationPromise;
      } catch (e) {
        setStatus(`Error waiting for Zotero: ${e.message || e}`, "error");
        return;
      }

      // ── Helpers ────────────────────────────────────────────────────────────

      function localizeType(name) {
        try { return Zotero.ItemTypes.getLocalizedString(name); }
        catch (e) { return name; }
      }

      function unlocalizeType(str) {
        try {
          for (const t of Zotero.ItemTypes.getTypes()) {
            try {
              if (Zotero.ItemTypes.getLocalizedString(t.name).toLowerCase() === str.toLowerCase())
                return t.name;
            } catch (e) {}
          }
        } catch (e) {}
        return str;
      }

      function getCitationKey(item) {
        // BBT KeyManager covers both auto-generated and pinned keys
        try {
          if (Zotero.BetterBibTeX?.KeyManager) {
            const rec = Zotero.BetterBibTeX.KeyManager.get(item.id);
            if (rec?.citekey) return rec.citekey;
          }
        } catch (e) {}
        // Extra-field fallback (BBT pinned format / manual entry)
        const extra = item.getField("extra") || "";
        const m = extra.match(/^Citation Key:\s*(.+)$/m);
        return m ? m[1].trim() : "";
      }

      function safeGetField(item, field) {
        try { return item.getField(field) || ""; } catch (e) { return ""; }
      }

      function formatCreator(c) {
        if (c.fieldMode === 1) return c.name || "";
        const parts = [c.lastName, c.firstName].filter(Boolean);
        return parts.length === 2 ? `${parts[0]}, ${parts[1]}` : parts[0] || "";
      }

      function parseYear(dateStr) {
        if (!dateStr) return "";
        const m = dateStr.match(/\b(\d{4})\b/);
        return m ? m[1] : "";
      }

      function parseMonth(dateStr) {
        if (!dateStr) return "";
        const iso = dateStr.match(/^\d{4}-(\d{2})/);
        if (iso) return iso[1];
        const map = {
          january:"01", february:"02", march:"03", april:"04", may:"05", june:"06",
          july:"07", august:"08", september:"09", october:"10", november:"11", december:"12",
          jan:"01", feb:"02", mar:"03", apr:"04", jun:"06",
          jul:"07", aug:"08", sep:"09", oct:"10", nov:"11", dec:"12",
        };
        const lower = dateStr.toLowerCase();
        for (const [name, num] of Object.entries(map)) {
          if (lower.includes(name)) return num;
        }
        return "";
      }

      function normalizeMonth(value) {
        if (!value) return "";
        const n = parseInt(value, 10);
        if (!isNaN(n) && n >= 1 && n <= 12) return String(n).padStart(2, "0");
        return parseMonth(value);
      }

      // ── Load items ─────────────────────────────────────────────────────────

      const libraryID = Zotero.Libraries.userLibraryID;
      const allZoteroItems = await Zotero.Items.getAll(libraryID);
      const items = allZoteroItems
        .filter(item => item.isRegularItem() && !item.deleted)
        .map(item => {
          const dateStr = item.getField("date") || "";
          const first = item.getCreators()[0] || null;
          return {
            id: item.id,
            type: localizeType(item.itemType),
            citationKey: getCitationKey(item),
            title: item.getField("title") || "",
            shortTitle: safeGetField(item, "shortTitle"),
            author: first ? formatCreator(first) : "",
            year: parseYear(dateStr),
            month: parseMonth(dateStr),
          };
        });

      // ── Sort ───────────────────────────────────────────────────────────────

      let sortField = null;
      let sortAsc = true;

      function applySort(field) {
        sortAsc = (sortField === field) ? !sortAsc : true;
        sortField = field;
        items.sort((a, b) => {
          const av = (a[field] || "").toLowerCase();
          const bv = (b[field] || "").toLowerCase();
          return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
        });
        document.querySelectorAll("th[data-sort]").forEach(th => {
          const arrow = th.querySelector(".sort-arrow");
          if (th.dataset.sort === field) {
            th.classList.add("sorted");
            arrow.textContent = sortAsc ? "↑" : "↓";
          } else {
            th.classList.remove("sorted");
            arrow.textContent = "";
          }
        });
        rebuildTable();
      }

      document.querySelectorAll("th[data-sort]").forEach(th => {
        th.addEventListener("click", () => applySort(th.dataset.sort));
      });

      // ── Save ───────────────────────────────────────────────────────────────

      async function saveField(item, field, value) {
        const zitem = await Zotero.Items.getAsync(item.id);
        if (!zitem) throw new Error("Item not found");

        switch (field) {
          case "type": {
            const typeID = Zotero.ItemTypes.getID(unlocalizeType(value));
            if (typeID) zitem.setType(typeID);
            break;
          }
          case "citationKey": {
            let extra = zitem.getField("extra") || "";
            extra = extra.replace(/^Citation Key:.*(\r?\n|$)/m, "").trim();
            if (value) extra = `Citation Key: ${value}${extra ? "\n" + extra : ""}`;
            zitem.setField("extra", extra);
            break;
          }
          case "title":
          case "shortTitle":
            zitem.setField(field, value);
            break;
          case "author": {
            const creators = zitem.getCreators();
            const hasSep = value.includes(",");
            const parts = value.split(",").map(s => s.trim());
            const updated = {
              lastName: parts[0] || "",
              firstName: hasSep ? (parts[1] || "") : "",
              fieldMode: hasSep ? 0 : 1,
            };
            if (creators.length > 0) {
              creators[0] = { ...creators[0], ...updated };
            } else {
              creators.push({ ...updated, creatorType: "author" });
            }
            zitem.setCreators(creators);
            break;
          }
          case "year":
          case "month": {
            const existing = zitem.getField("date") || "";
            const yr = field === "year" ? value : parseYear(existing);
            const mo = field === "month" ? normalizeMonth(value) : parseMonth(existing);
            zitem.setField("date", yr ? (mo ? `${yr}-${String(mo).padStart(2, "0")}` : yr) : "");
            break;
          }
        }
        await zitem.saveTx();
      }

      // ── Table ──────────────────────────────────────────────────────────────

      function updateCellClass(td, value) {
        td.className = value ? "present" : "missing";
      }

      function makeCell(item, field, initialValue) {
        const td = document.createElement("td");
        updateCellClass(td, initialValue);

        const input = document.createElement("input");
        input.type = "text";
        input.className = "cell";
        input.value = initialValue;
        input.spellcheck = false;
        input.autocomplete = "off";

        input.addEventListener("focus", () => { input._saved = input.value; });

        input.addEventListener("blur", async () => {
          const newVal = input.value;
          if (newVal === input._saved) return;

          updateCellClass(td, newVal);
          setStatus("Saving…", "saving");

          try {
            await saveField(item, field, newVal.trim());
            item[field] = newVal.trim();
            input._saved = newVal;
            setStatus(`Saved — ${item.title || item.citationKey || item.id}`);
          } catch (e) {
            setStatus(`Error saving: ${e.message || e}`, "error");
            input.value = input._saved;
            updateCellClass(td, input._saved);
          }
        });

        td.appendChild(input);
        return td;
      }

      function buildRow(item) {
        const tr = document.createElement("tr");
        for (const field of ["type", "citationKey", "title", "shortTitle", "author", "year", "month"]) {
          tr.appendChild(makeCell(item, field, item[field]));
        }
        return tr;
      }

      function rebuildTable() {
        tbody.textContent = "";
        const frag = document.createDocumentFragment();
        for (const item of items) frag.appendChild(buildRow(item));
        tbody.appendChild(frag);
      }

      rebuildTable();
      setStatus(`${items.length} item${items.length !== 1 ? "s" : ""}`);
    })();
  </script>
</body>
</html>
