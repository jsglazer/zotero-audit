<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zotero Audit</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    #wrapper {
      width: 100%;
      height: calc(100% - 24px);
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    thead tr {
      background: #111;
    }

    th {
      padding: 5px 8px;
      text-align: left;
      font-weight: 600;
      color: #999;
      border-bottom: 2px solid #333;
      border-right: 1px solid #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
      cursor: pointer;
      position: relative;
    }

    .resizer {
      position: absolute;
      right: 0;
      top: 0;
      width: 5px;
      height: 100%;
      cursor: col-resize;
      z-index: 20;
    }

    .resizer:hover, .resizer.resizing {
      background: rgba(255,255,255,0.2);
    }

    th:hover {
      color: #ccc;
      background: #1a1a1a;
    }

    th.sorted {
      color: #fff;
    }

    .sort-arrow {
      margin-left: 3px;
      font-size: 10px;
    }

    /* Column widths */
    th:nth-child(1), td:nth-child(1) { width: 11%; }
    th:nth-child(2), td:nth-child(2) { width: 17%; }
    th:nth-child(3), td:nth-child(3) { width: 21%; }
    th:nth-child(4), td:nth-child(4) { width: 10%; }
    th:nth-child(5), td:nth-child(5) { width: 15%; }
    th:nth-child(6), td:nth-child(6) { width: 10%; }
    th:nth-child(7), td:nth-child(7) { width: 10%; }
    th:nth-child(8), td:nth-child(8) { width: 6%; min-width: 44px; }

    .go-btn {
      display: block;
      width: 100%;
      height: 100%;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 15px;
      padding: 0;
    }

    .go-btn:hover {
      color: #fff;
      background: #1a2a3a;
    }

    /* Marks the row most recently opened in Zotero via the → arrow */
    .go-btn.active {
      background: #3c82ff;
      color: #fff;
    }

    .go-btn.active:hover {
      background: #2f6fe0;
    }

    tbody tr:nth-child(even) td {
      filter: brightness(0.95);
    }

    td {
      padding: 0;
      border: 1px solid #1c1c1c;
      height: 26px;
    }

    td.present {
      background: #90ee90;
    }

    td.missing {
      background: #ffb3b3;
    }

    input.cell {
      display: block;
      width: 100%;
      height: 100%;
      padding: 4px 7px;
      border: none;
      outline: none;
      font-size: 13px;
      font-family: inherit;
      background: transparent;
      color: #000;
      cursor: text;
    }

    input.cell:focus {
      box-shadow: inset 0 0 0 2px rgba(60, 130, 255, 0.75);
      background: rgba(255, 255, 255, 0.15);
    }

    #statusbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      line-height: 24px;
      background: #0d0d0d;
      color: #777;
      padding: 0 10px;
      font-size: 11px;
      border-top: 1px solid #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #statusbar.error  { color: #ff8080; }
    #statusbar.saving { color: #aaa; }
  </style>
</head>
<body>
  <div id="wrapper">
    <table>
      <thead>
        <tr>
          <th data-sort="type">Content Type<span class="sort-arrow"></span></th>
          <th data-sort="citationKey">Citation ID<span class="sort-arrow"></span></th>
          <th data-sort="title">Title<span class="sort-arrow"></span></th>
          <th data-sort="shortTitle">Short Title<span class="sort-arrow"></span></th>
          <th data-sort="author">Author<span class="sort-arrow"></span></th>
          <th data-sort="year">Year<span class="sort-arrow"></span></th>
          <th data-sort="month">Month<span class="sort-arrow"></span></th>
          <th class="no-resize" style="cursor:default;"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div id="statusbar">Loading…</div>

  <script>
    "use strict";

    (async () => {
      const tbody = document.getElementById("tbody");
      const statusbar = document.getElementById("statusbar");

      function setStatus(msg, cls) {
        statusbar.textContent = msg;
        statusbar.className = cls || "";
      }

      // Zotero is passed from bootstrap.js via openDialog's extra argument.
      // window.arguments[0] is a live object reference (chrome-to-chrome is safe).
      const Zotero = window.arguments[0];
      if (!Zotero) {
        setStatus("Error: Zotero not passed to dialog", "error");
        return;
      }
      try {
        await Zotero.initializationPromise;
      } catch (e) {
        setStatus(`Error waiting for Zotero: ${e.message || e}`, "error");
        return;
      }

      // ── Helpers ────────────────────────────────────────────────────────────

      function localizeType(name) {
        try { return Zotero.ItemTypes.getLocalizedString(name); }
        catch (e) { return name; }
      }

      function unlocalizeType(str) {
        try {
          for (const t of Zotero.ItemTypes.getTypes()) {
            try {
              if (Zotero.ItemTypes.getLocalizedString(t.name).toLowerCase() === str.toLowerCase())
                return t.name;
            } catch (e) {}
          }
        } catch (e) {}
        return str;
      }

      let _bbtNote = "";

      function getCitationKey(item) {
        try {
          const km = Zotero.BetterBibTeX?.KeyManager;
          if (km) {
            const rec = km.get(item.id);
            const key = rec?.citekey ?? rec?.key ?? rec?.citationKey;
            if (key) return key;
            if (!_bbtNote) _bbtNote = "BBT KeyManager returned no key";
          } else if (Zotero.BetterBibTeX) {
            if (!_bbtNote) _bbtNote = "BBT loaded but KeyManager unavailable";
          } else {
            if (!_bbtNote) _bbtNote = "BBT not loaded";
          }
        } catch (e) {
          if (!_bbtNote) _bbtNote = `BBT error: ${e.message}`;
        }
        // Extra-field fallback for pinned / manually entered keys
        const extra = item.getField("extra") || "";
        const m = extra.match(/^Citation Key:\s*(.+)$/m);
        return m ? m[1].trim() : "";
      }

      function safeGetField(item, field) {
        try { return item.getField(field) || ""; } catch (e) { return ""; }
      }

      function formatCreator(c) {
        if (c.fieldMode === 1) return c.name || "";
        const parts = [c.lastName, c.firstName].filter(Boolean);
        return parts.length === 2 ? `${parts[0]}, ${parts[1]}` : parts[0] || "";
      }

      function parseYear(dateStr) {
        if (!dateStr) return "";
        const m = dateStr.match(/\b(\d{4})\b/);
        return m ? m[1] : "";
      }

      function parseMonth(dateStr) {
        if (!dateStr) return "";
        const iso = dateStr.match(/^\d{4}-(\d{2})/);
        if (iso) return iso[1];
        const map = {
          january:"01", february:"02", march:"03", april:"04", may:"05", june:"06",
          july:"07", august:"08", september:"09", october:"10", november:"11", december:"12",
          jan:"01", feb:"02", mar:"03", apr:"04", jun:"06",
          jul:"07", aug:"08", sep:"09", oct:"10", nov:"11", dec:"12",
        };
        const lower = dateStr.toLowerCase();
        for (const [name, num] of Object.entries(map)) {
          if (lower.includes(name)) return num;
        }
        return "";
      }

      function normalizeMonth(value) {
        if (!value) return "";
        const n = parseInt(value, 10);
        if (!isNaN(n) && n >= 1 && n <= 12) return String(n).padStart(2, "0");
        return parseMonth(value);
      }

      // ── Load items ─────────────────────────────────────────────────────────

      // Wait for BBT to finish indexing so KeyManager has all keys available.
      // Safe to await when BBT is absent (undefined?.ready === undefined → resolves immediately).
      try { await Zotero.BetterBibTeX?.ready; } catch (e) {}

      const libraryID = Zotero.Libraries.userLibraryID;
      const allZoteroItems = await Zotero.Items.getAll(libraryID);
      const items = allZoteroItems
        .filter(item => item.isRegularItem() && !item.deleted)
        .map(item => {
          const dateStr = item.getField("date") || "";
          const first = item.getCreators()[0] || null;
          return {
            id: item.id,
            type: localizeType(item.itemType),
            citationKey: getCitationKey(item),
            title: item.getField("title") || "",
            shortTitle: safeGetField(item, "shortTitle"),
            author: first ? formatCreator(first) : "",
            year: parseYear(dateStr),
            month: parseMonth(dateStr),
          };
        });

      // ── Sort ───────────────────────────────────────────────────────────────

      let sortField = null;
      let sortAsc = true;

      function applySort(field) {
        sortAsc = (sortField === field) ? !sortAsc : true;
        sortField = field;
        items.sort((a, b) => {
          const av = (a[field] || "").toLowerCase();
          const bv = (b[field] || "").toLowerCase();
          return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
        });
        document.querySelectorAll("th[data-sort]").forEach(th => {
          const arrow = th.querySelector(".sort-arrow");
          if (th.dataset.sort === field) {
            th.classList.add("sorted");
            arrow.textContent = sortAsc ? "↑" : "↓";
          } else {
            th.classList.remove("sorted");
            arrow.textContent = "";
          }
        });
        rebuildTable();
      }

      document.querySelectorAll("th[data-sort]").forEach(th => {
        th.addEventListener("click", () => applySort(th.dataset.sort));
      });

      // ── Column resize ──────────────────────────────────────────────────────
      let _resizing = null;

      document.querySelectorAll("th:not(.no-resize)").forEach(th => {
        const handle = document.createElement("span");
        handle.className = "resizer";
        th.appendChild(handle);

        handle.addEventListener("mousedown", e => {
          e.preventDefault();
          e.stopPropagation();
          _resizing = { th, startX: e.clientX, startWidth: th.offsetWidth };
          handle.classList.add("resizing");
        });
        handle.addEventListener("click", e => e.stopPropagation());
      });

      document.addEventListener("mousemove", e => {
        if (!_resizing) return;
        const w = Math.max(40, _resizing.startWidth + (e.clientX - _resizing.startX));
        _resizing.th.style.width = w + "px";
      });

      document.addEventListener("mouseup", () => {
        if (!_resizing) return;
        _resizing.th.querySelector(".resizer")?.classList.remove("resizing");
        _resizing = null;
      });

      // ── Cmd/Ctrl+W closes dialog ───────────────────────────────────────────
      document.addEventListener("keydown", e => {
        if ((e.metaKey || e.ctrlKey) && e.key === "w") {
          e.preventDefault();
          window.close();
        }
      });

      // ── Save ───────────────────────────────────────────────────────────────

      async function saveField(item, field, value) {
        const zitem = await Zotero.Items.getAsync(item.id);
        if (!zitem) throw new Error("Item not found");

        switch (field) {
          case "type": {
            const typeID = Zotero.ItemTypes.getID(unlocalizeType(value));
            if (typeID) zitem.setType(typeID);
            break;
          }
          case "citationKey": {
            let extra = zitem.getField("extra") || "";
            extra = extra.replace(/^Citation Key:.*(\r?\n|$)/m, "").trim();
            if (value) extra = `Citation Key: ${value}${extra ? "\n" + extra : ""}`;
            zitem.setField("extra", extra);
            break;
          }
          case "title":
          case "shortTitle":
            zitem.setField(field, value);
            break;
          case "author": {
            const creators = zitem.getCreators();
            const hasSep = value.includes(",");
            const parts = value.split(",").map(s => s.trim());
            const updated = {
              lastName: parts[0] || "",
              firstName: hasSep ? (parts[1] || "") : "",
              fieldMode: hasSep ? 0 : 1,
            };
            if (creators.length > 0) {
              creators[0] = { ...creators[0], ...updated };
            } else {
              creators.push({ ...updated, creatorType: "author" });
            }
            zitem.setCreators(creators);
            break;
          }
          case "year":
          case "month": {
            const existing = zitem.getField("date") || "";
            const yr = field === "year" ? value : parseYear(existing);
            const mo = field === "month" ? normalizeMonth(value) : parseMonth(existing);
            zitem.setField("date", yr ? (mo ? `${yr}-${String(mo).padStart(2, "0")}` : yr) : "");
            break;
          }
        }
        await zitem.saveTx();
      }

      // ── Table ──────────────────────────────────────────────────────────────

      function updateCellClass(td, value) {
        td.className = value ? "present" : "missing";
      }

      function makeCell(item, field, initialValue) {
        const td = document.createElement("td");
        updateCellClass(td, initialValue);

        const input = document.createElement("input");
        input.type = "text";
        input.className = "cell";
        input.value = initialValue;
        input.spellcheck = false;
        input.autocomplete = "off";

        input.addEventListener("focus", () => { input._saved = input.value; });

        input.addEventListener("blur", async () => {
          const newVal = input.value;
          if (newVal === input._saved) return;

          updateCellClass(td, newVal);
          setStatus("Saving…", "saving");

          try {
            await saveField(item, field, newVal.trim());
            item[field] = newVal.trim();
            input._saved = newVal;
            setStatus(`Saved — ${item.title || item.citationKey || item.id}`);
          } catch (e) {
            setStatus(`Error saving: ${e.message || e}`, "error");
            input.value = input._saved;
            updateCellClass(td, input._saved);
          }
        });

        td.appendChild(input);
        return td;
      }

      // Tracks the single arrow currently highlighted blue, so a new click
      // clears the previous one — only one row is marked "open" at a time.
      let _activeGoBtn = null;

      function makeGoCell(item) {
        const td = document.createElement("td");
        const btn = document.createElement("button");
        btn.className = "go-btn";
        btn.textContent = "→";
        btn.title = "Open in Zotero";
        btn.addEventListener("click", async () => {
          if (_activeGoBtn && _activeGoBtn !== btn) {
            _activeGoBtn.classList.remove("active");
          }
          btn.classList.add("active");
          _activeGoBtn = btn;
          try {
            const mainWin = Zotero.getMainWindow();
            if (mainWin?.ZoteroPane) {
              await mainWin.ZoteroPane.selectItem(item.id);
              mainWin.focus();
            }
          } catch (e) {
            setStatus(`Error: ${e.message || e}`, "error");
          }
        });
        td.appendChild(btn);
        return td;
      }

      // Maps a Zotero item id → the live row's data object and cell inputs,
      // so external metadata changes can refresh cells in place. Rebuilt on
      // every rebuildTable() (sort) since the DOM nodes are recreated.
      const EDITABLE_FIELDS = ["type", "citationKey", "title", "shortTitle", "author", "year", "month"];
      const rowRefs = new Map();

      function buildRow(item) {
        const tr = document.createElement("tr");
        const inputs = {};
        for (const field of EDITABLE_FIELDS) {
          const td = makeCell(item, field, item[field]);
          inputs[field] = td.querySelector("input.cell");
          tr.appendChild(td);
        }
        tr.appendChild(makeGoCell(item));
        rowRefs.set(item.id, { item, inputs });
        return tr;
      }

      function rebuildTable() {
        tbody.textContent = "";
        rowRefs.clear();
        const frag = document.createDocumentFragment();
        for (const item of items) frag.appendChild(buildRow(item));
        tbody.appendChild(frag);
      }

      // ── Live sync: reflect external Zotero edits into open rows ─────────────

      function readItemFields(zitem) {
        const dateStr = zitem.getField("date") || "";
        const first = zitem.getCreators()[0] || null;
        return {
          type: localizeType(zitem.itemType),
          citationKey: getCitationKey(zitem),
          title: zitem.getField("title") || "",
          shortTitle: safeGetField(zitem, "shortTitle"),
          author: first ? formatCreator(first) : "",
          year: parseYear(dateStr),
          month: parseMonth(dateStr),
        };
      }

      async function refreshRow(ref) {
        let zitem;
        try {
          zitem = await Zotero.Items.getAsync(ref.item.id);
        } catch (e) {
          return;
        }
        if (!zitem) return;

        const fresh = readItemFields(zitem);
        for (const field of EDITABLE_FIELDS) {
          const value = fresh[field];
          ref.item[field] = value;
          const input = ref.inputs[field];
          if (!input) continue;
          // Don't clobber a cell the user is actively editing.
          if (input === document.activeElement) continue;
          input.value = value;
          input._saved = value;
          updateCellClass(input.parentNode, value);
        }
      }

      const notifierObserver = {
        notify: async (event, type, ids /*, extraData */) => {
          if (type !== "item" || event !== "modify") return;
          for (const id of ids) {
            const ref = rowRefs.get(id) || rowRefs.get(Number(id));
            if (ref) await refreshRow(ref);
          }
        },
      };

      const notifierID = Zotero.Notifier.registerObserver(
        notifierObserver, ["item"], "zotero-audit"
      );
      window.addEventListener("unload", () => {
        try { Zotero.Notifier.unregisterObserver(notifierID); } catch (e) {}
      });

      rebuildTable();
      const keyCount = items.filter(i => i.citationKey).length;
      const bbtSuffix = _bbtNote ? ` | ${_bbtNote}` : "";
      setStatus(`${items.length} item${items.length !== 1 ? "s" : ""} | ${keyCount} citation key${keyCount !== 1 ? "s" : ""}${bbtSuffix}`);
    })();
  </script>
</body>
</html>
