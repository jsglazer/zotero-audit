name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Zotero bootstrapped extension: build.sh zips the sources into the .xpi.
      - name: Build XPI
        run: bash build.sh

      - name: Verify artifact contents
        run: |
          test -f zotero-audit.xpi
          unzip -l zotero-audit.xpi
