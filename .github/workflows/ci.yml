name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Zotero bootstrapped extension: build.sh zips the sources into the .xpi.
      - name: Build XPI
        run: bash build.sh

      - name: Verify artifact contents
        run: |
          test -f zotero-audit.xpi
          unzip -l zotero-audit.xpi
